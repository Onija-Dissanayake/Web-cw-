    <style>
      main {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;    
        color: white;
        padding: 10px;
      }

      #title {
        margin-top: 20px;
        margin-bottom: 20px;
        font-weight: 500;
        letter-spacing: 1px;
      }

      svg {
        width: 100%;
        max-width: 1100px;
      }

      /* connector lines */
      .line {
        stroke: #c7a46a;
        stroke-width: 2;
      }

      /* node design */
      .node rect {
        fill: rgba(255, 255, 255, 0.05);
        stroke: #c7a46a;
        stroke-width: 1.5;
        rx: 12;
        transition: 0.3s;
      }

      .node text {
        fill: white;
        font-size: 14px;
        pointer-events: none;
      }

      /* hover effect */
      .node:hover rect {
        fill: #c7a46a;
      }

      .node:hover text {
        fill: #021c14;
      }

      #title{
            text-align:center;
            color: #c7a46a;
            text-shadow: 4px 4px 15px #000000;
            
        }

    </style>
  </head>
