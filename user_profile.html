<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #021c14, #053b2a, #021c14);
        color: white;
            }

      /* Card */
      .container {
        width: 450px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: 500;
      }

      /* Progress bar */
      .progress-bar {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        margin-bottom: 25px;
      }

      .progress {
        height: 100%;
        width: 0%;
        background: #c7a46a;
        border-radius: 20px;
        transition: 0.4s;
      }

      /* Inputs */
      .input-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
        opacity: 0.8;
      }

      input {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        outline: none;
      }

      /* Buttons */
      button {
        margin-top: 10px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #c7a46a;
        color: #021c14;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #e6c487;
      }
hi
      /* Hide sections */
      .section {
        display: none;
      }

      /* Profile summary */
      .profile-summary {
        margin-top: 20px;
        background: rgba(0, 0, 0, 0.25);
        padding: 20px;
        border-radius: 10px;
        display: none;
      }

      .profile-summary div {
        margin-bottom: 8px;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>User Profile</h1>

      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>

      <!-- BASIC DETAILS -->
      <div id="step1">
        <div class="input-group">
          <label>Name</label>
          <input type="text" id="name">
        </div>

        <div class="input-group">
          <label>Username</label>
          <input type="text" id="username">
        </div>

        <div class="input-group">
          <label>Address</label>
          <input type="text" id="address">
        </div>

        <div class="input-group">
          <label>Role</label>
          <input type="text" id="role">
        </div>

        <button onclick="nextStep1()">Next</button>
      </div>

      <!-- INTERESTS -->
      <div id="step2" class="section">
        <div class="input-group">
          <label>Favourite Nature Activity</label>
          <input type="text" id="activity">
        </div>

        <div class="input-group">
          <label>Favourite Ecosystem</label>
          <input type="text" id="ecosystem">
        </div>

        <button onclick="nextStep2()">Next</button>
      </div>

      <!-- ACTIONS -->
      <div id="step3" class="section">
        <div class="input-group">
          <label>Do you recycle?</label>
          <input type="text" id="recycle">
        </div>

        <div class="input-group">
          <label>How do you help the environment?</label>
          <input type="text" id="action">
        </div>

        <button onclick="finishProfile()">Finish</button>
      </div>

      <!-- PROFILE SUMMARY -->
      <div class="profile-summary" id="summary">
        <h2>Profile Summary</h2>
        <br>
        <div><b>Name:</b> <span id="sName"></span></div><br>
        <div><b>Username:</b> <span id="sUsername"></span></div><br>
        <div><b>Address:</b> <span id="sAddress"></span></div><br>
        <div><b>Role:</b> <span id="sRole"></span></div><br>
        <div><b>Activity:</b> <span id="sActivity"></span></div><br>
        <div><b>Ecosystem:</b> <span id="sEco"></span></div><br>
        <div><b>Recycle:</b> <span id="sRecycle"></span></div><br>
        <div><b>Environmental Action:</b> <span id="sAction"></span></div>
      </div>
    </div>

    <script>
      /* Step 1 */
      function nextStep1() {
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
        document.getElementById("progress").style.width = "33%";
      }

      /* Step 2 */
      function nextStep2() {
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "block";
        document.getElementById("progress").style.width = "66%";
      }

      /* Finish */
      function finishProfile() {
        document.getElementById("step3").style.display = "none";
        document.getElementById("progress").style.width = "100%";

        /* Display summary */
        document.getElementById("summary").style.display = "block";

        document.getElementById("sName").textContent = document.getElementById("name").value;
        document.getElementById("sUsername").textContent = document.getElementById("username").value;
        document.getElementById("sAddress").textContent = document.getElementById("address").value;
        document.getElementById("sRole").textContent = document.getElementById("role").value;

        document.getElementById("sActivity").textContent = document.getElementById("activity").value;
        document.getElementById("sEco").textContent = document.getElementById("ecosystem").value;

        document.getElementById("sRecycle").textContent = document.getElementById("recycle").value;
        document.getElementById("sAction").textContent = document.getElementById("action").value;
      }
    </script>
  </body>
</html>
