<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life on Land</title>

    <link rel="stylesheet" href="global.css">

    <style>
        h2{
            text-align:center;
            color: #c7a46a;
            text-shadow: 4px 4px 15px #000000;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .gallery-item::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            transition: 0.4s ease;
        }

        .gallery-item p {
            position: absolute;
            bottom: 15px;
            left: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            z-index: 2;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
            filter: brightness(0.7);
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s ease, filter 0.5s ease;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s ease;
            z-index: 1000;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            max-width: 500px;
            transform: scale(0.8);
            transition: 0.4s ease;
        }

        .modal-content img {
            width: 100%;
            border-radius: 10px;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        #closeBtn {
            cursor: pointer;
            font-size: 24px;
            float: right;
        }

        .modal-content.text h3,
        .modal-content.text p {
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>

<body>

<header>
    <div class="pill">
        <img src="https://images.unsplash.com/vector-1753953988678-284e5ea345d5?q=80&w=1548&auto=format&fit=crop" alt="Forest representing life on land">
        <h1>Life on Land</h1>
    </div>

    <nav>
        <ul class="navigation-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="ais.html">AIS</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
            <li><a href="user_profile.html">User Profile</a></li>
            <li><a href="feedback.html">Feedback</a></li>
            <li><a href="team.html">Team Page</a></li>
            <li><a href="sitemap.html">Sitemap</a></li>
        </ul>
    </nav>
</header>

<main>

<h2>Gallery</h2><br>

<div class="gallery">

    <div class="gallery-item" data-title="Forests" data-desc="Forests are vital for biodiversity and climate balance." data-img="https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?q=80&w=2074">
        <img src="https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?q=80&w=2074" alt="Forest">
        <p>Forests</p>
    </div>

    <div class="gallery-item" data-title="Wildlife" data-desc="Wildlife plays a crucial role in ecosystems." data-img="https://images.unsplash.com/photo-1444464666168-49d633b86797?q=80&w=2069">
        <img src="https://images.unsplash.com/photo-1444464666168-49d633b86797?q=80&w=2069" alt="Wildlife">
        <p>Wildlife</p>
    </div>

    <div class="gallery-item" data-title="Ecosystems" data-desc="Healthy ecosystems sustain life on Earth." data-img="https://images.unsplash.com/photo-1595366586798-11e020008a2b?q=80&w=2074">
        <img src="https://images.unsplash.com/photo-1595366586798-11e020008a2b?q=80&w=2074" alt="Ecosystem">
        <p>Ecosystems</p>
    </div>

    <div class="gallery-item" data-title="Sustainability" data-desc="Sustainable actions protect our future." data-img="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=2213">
        <img src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=2213" alt="Sustainability">
        <p>Sustainability</p>
    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span id="closeBtn">&times;</span>
        <img id="modalImg" src="#" alt="Preview image">
        <h3 id="modalTitle"></h3>
        <p id="modalDesc"></p>

        <button id="colorBtn">Change Color</button>
        <button id="fontBtn">Change Font</button>
    </div>
</div>

</main>

<footer>
    <p>Life on Land Project</p>

    <div class="footer-links">
        <a href="pageEditor_ST1.html">Page Editor</a> |
        <a href="validation_ST1.html">Validation</a>
    </div>

    <p>Created by: Thisal Pathirana</p>
    <p>&copy; 2026 Life on Land. All rights reserved.</p>
</footer>

<script>
const items = document.querySelectorAll(".gallery-item");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const modalTitle = document.getElementById("modalTitle");
const modalDesc = document.getElementById("modalDesc");
const closeBtn = document.getElementById("closeBtn");
const modalBox = document.querySelector(".modal-content");

// open modal
items.forEach(item => {
    item.addEventListener("click", () => {
        modal.classList.add("show");

        modalImg.src = item.dataset.img;
        modalTitle.textContent = item.dataset.title;
        modalDesc.textContent = item.dataset.desc;
    });
});

// close modal
closeBtn.addEventListener("click", () => {
    modal.classList.remove("show");
});

modal.addEventListener("click", (e) => {
    if (e.target === modal) {
        modal.classList.remove("show");
    }
});

// color change
document.getElementById("colorBtn").onclick = () => {
    modalBox.style.background = "#c7a46a";
};

//FONT TOGGLE
    document.getElementById("fontBtn").onclick = () => {
    modalBox.classList.toggle("text");
};
</script>

</body>
</html>
