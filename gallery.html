        <meta charset = "UTF-8">

        <link rel = "stylesheet" href="global.css">
        <style>
            h2{
            text-align:center;
            color: #c7a46a;
            text-shadow: 4px 4px 15px #000000;
            
            }

            .gallery {
                display: grid;
                grid-template-columns: repeat(2, 1fr); /* 2 per row */
                gap: 25px;
                max-width: 900px;
                margin: 0 auto;
            }

            .gallery-item {
                position: relative;
                overflow: hidden;
                border-radius: 15px;
                cursor: pointer;
                transition: all 0.4s ease;
            }
            .gallery-item::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,0.3);
                opacity: 0;
                transition: 0.4s ease;
            }

            .gallery-item p {
                position: absolute;
                bottom: 15px;
                left: 20px;
                color: white;
                font-size: 18px;
                font-weight: bold;
                z-index: 2;
            }

            .gallery-item:hover img {
                transform: scale(1.1);
                filter: brightness(0.7);
            }

            .gallery-item:hover::after {
                opacity: 1;
            }

            .gallery-item:hover {
                transform: translateY(-8px);
            }


            .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s ease, filter 0.5s ease;
            }

            .modal {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.75);
                backdrop-filter: blur(8px); /* 🔥 premium blur */
                display: flex;
                justify-content: center;
                align-items: center;
                opacity: 0;
                visibility: hidden;
                transition: 0.4s ease;
                z-index: 1000;
            }

            .modal.show {
                opacity: 1;
                visibility: visible;
            }

            .hidden {
                display: none;
            }

            .modal-content {
                background: white;
                color: black;
                padding: 25px;
                border-radius: 15px;
                max-width: 500px;
                transform: scale(0.8);
                transition: 0.4s ease;
            }

            .modal-content img {
                width: 100%;
                border-radius: 10px;
            }

            .modal.show .modal-content {
                transform: scale(1);
            }

            #closeBtn {
                cursor: pointer;
                font-size: 24px;
                float: right;
            }
        </style>
    </head>

        <div class="gallery-item" data-title="Forests" data-desc="Forests are vital for biodiversity and climate balance." data-img="https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?q=80&w=2074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">

    <script>
const items = document.querySelectorAll(".gallery-item");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const modalTitle = document.getElementById("modalTitle");
const modalDesc = document.getElementById("modalDesc");
const closeBtn = document.getElementById("closeBtn");

// click to open modal
items.forEach(item => {
    item.addEventListener("click", () => {
        modal.classList.add("show");

        modalImg.src = item.dataset.img;
        modalTitle.textContent = item.dataset.title;
        modalDesc.textContent = item.dataset.desc;

        //to reset styles
        const modalBox = document.querySelector(".modal-content");
        modalBox.style.background = "white";
        modalBox.style.fontFamily = "Arial";
    });
});

// close button
closeBtn.addEventListener("click", () => {
    modal.classList.remove("show");
});

// click outside to close
modal.addEventListener("click", (e) => {
    if (e.target === modal) {
        modal.classList.remove("show");
    }
});

// user customization
document.getElementById("colorBtn").onclick = () => {
    document.querySelector(".modal-content").style.background = "#c7a46a";
};

// user customization
document.getElementById("fontBtn").onclick = () => {
    const box = document.querySelector(".modal-content");

    
    if (box.style.fontFamily === "Poppins", "sans-serif") {
        
        box.style.fontFamily = "'Courier New', monospace";
    } else {
        
        box.style.fontFamily = "Poppins", "sans-serif";
    }
};

</script>
